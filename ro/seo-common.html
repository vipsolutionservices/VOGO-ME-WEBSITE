<!--
  Reusable SEO/common head fragment for /ro pages.
  Keep only values that are truly global across all Romanian pages.
  Page-specific tags (title, description, canonical, og:url, etc.) must stay in each page file.
-->
<meta name="robots" content="index, follow" />
<meta property="og:locale" content="ro_RO" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="VOGO" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
