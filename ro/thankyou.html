<!DOCTYPE html>
<!--
  File role: Post-checkout thank-you page in English.
  Includes clear actions for plugin download, instructions, WhatsApp support, and contact form.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | VOGO</title>
  <style>
    :root {
      --vogo-green: #0f7b65;
      --vogo-green-dark: #0a4f41;
      --text: #111317;
      --muted: #4d5562;
      --white: #ffffff;
      --border: #d7dbe1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      line-height: 1.45;
    }

    .btn {
      border: 1px solid transparent;
      padding: 11px 18px;
      border-radius: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: var(--vogo-green);
      color: var(--white);
    }

    .btn-outline {
      border-color: #cad0d9;
      background: var(--white);
      color: var(--text);
    }

    .lead {
      font-size: 1.125rem;
      color: var(--muted);
      max-width: 70ch;
    }

    .eyebrow {
      color: var(--vogo-green-dark);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.8rem;
    }

    .thankyou-page {
      min-height: 100vh;
      background: radial-gradient(circle at top right, #dff4ee 0%, #f4f8fb 40%, #ffffff 100%);
    }

    .thankyou-wrap {
      width: min(980px, 92vw);
      margin: 0 auto;
      padding: 88px 0;
    }

    .thankyou-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px;
      box-shadow: 0 22px 40px rgba(10, 18, 32, 0.09);
      text-align: center;
    }

    .thankyou-card h1 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      margin: 0 0 16px;
      line-height: 1.1;
    }

    .thankyou-card .lead {
      margin: 0 auto;
    }

    .thankyou-actions {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }
  </style>
</head>
<body class="thankyou-page">
  <main class="thankyou-wrap">
    <section class="thankyou-card">
      <p class="eyebrow">Payment received</p>
      <h1>Thank you for your purchase!</h1>
      <p class="lead">Your order is being prepared. Use the quick actions below to install and activate your plugin smoothly.</p>

      <div class="thankyou-actions">
        <a class="btn btn-primary" id="download-plugin-whatsapp" target="_blank" rel="noopener">Download plugin</a>
        <a class="btn btn-outline" id="view-instructions-whatsapp" target="_blank" rel="noopener">View instructions</a>
        <a class="btn btn-outline" id="whatsapp-contact" target="_blank" rel="noopener">Contact us on WhatsApp</a>
        <a class="btn btn-outline" href="https://vogo.me/ecomm-contact-request/" target="_blank" rel="noopener">Contact us</a>
      </div>
    </section>
  </main>

  <script>
    (function initThankYouPage() {
      const downloadPluginButton = document.getElementById('download-plugin-whatsapp');
      const viewInstructionsButton = document.getElementById('view-instructions-whatsapp');
      const whatsappButton = document.getElementById('whatsapp-contact');
      const standardWhatsappNumber = '40742203383';

      const downloadPluginMessage = 'We request download link for paid plugin for company <>';
      const viewInstructionsMessage = 'We requestinstall istructions for company for company <>';

      if (downloadPluginButton) {
        downloadPluginButton.href = `https://wa.me/${standardWhatsappNumber}?text=${encodeURIComponent(downloadPluginMessage)}`;
      }

      if (viewInstructionsButton) {
        viewInstructionsButton.href = `https://wa.me/${standardWhatsappNumber}?text=${encodeURIComponent(viewInstructionsMessage)}`;
      }

      // Build code format requested by client: 19770905 + YYYYMMDDHHmm.
      const now = new Date();
      const pad = (value) => String(value).padStart(2, '0');
      const dynamicCode = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}${pad(now.getHours())}${pad(now.getMinutes())}`;
      const activationCode = `19770905${dynamicCode}`;
      const whatsappMessage = `Question for activating plugin ${activationCode}`;
      const whatsappUrl = `https://wa.me/40723313296?text=${encodeURIComponent(whatsappMessage)}`;

      if (whatsappButton) {
        whatsappButton.href = whatsappUrl;
      }
    })();
  </script>
</body>
</html>
