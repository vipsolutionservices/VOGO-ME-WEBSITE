<section class="vogo-reel">
  <style>
    :root{--vogo:#0e7f4e;--bg1:#fbfcfd;--bg2:#f6faf8}
    .vogo-reel{padding:24px 0;background:linear-gradient(180deg,var(--bg1),var(--bg2))}
    .vr-viewport{max-width:1400px;margin:0 auto;overflow:hidden}
    .vr-track{
      display:flex; gap:16px;
      width:max-content;           /* lăsăm conținutul cât are nevoie */
      animation: vr-scroll 45s linear infinite;
      will-change: transform;
    }
    /* pauză la hover/touch */
    .vr-viewport:hover .vr-track{animation-play-state:paused}

    .vr-item{
      flex:0 0 auto;
      display:flex; align-items:center; justify-content:center;
      padding:12px; border-radius:18px; background:#fff;
      border:1px solid #e8edf0; box-shadow:0 10px 30px rgba(0,0,0,.06);
    }
    /* păstrăm formatul original, fără tăiere */
    .vr-item img{
      height: clamp(260px, 45vh, 520px);
      width:auto; object-fit:contain; display:block;
    }

    /* mobil: arătăm câte 1 card lat ~ 80vw */
    @media (max-width:780px){
      .vr-item{padding:10px}
      .vr-item img{height: 64vh; max-height:520px}
      .vr-item{width:80vw}
    }

    /* mișcare R -> L (ca banda de logo-uri) */
    @keyframes vr-scroll{
      to{ transform: translateX(-50%) }
    }

    /* accessibility */
    @media (prefers-reduced-motion: reduce){
      .vr-track{animation:none}
    }
  </style>

  <div class="vr-viewport">
    <div class="vr-track">
      <!-- set 1 -->
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0017.jpg" alt="Search & results"></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0003.jpg" alt="Chat detail"></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0006.jpg" alt="Chats list"></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0007.jpg" alt="Sign in"></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0008.jpg" alt="Pickup & Destination"></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0009.jpg" alt="Map confirm"></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0010.jpg" alt="Vendor splash"></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0014.jpg" alt="Categories"></div>

      <!-- set 2 (duplicat pentru scroll continuu / seamless) -->
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0017.jpg" alt=""></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0003.jpg" alt=""></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0006.jpg" alt=""></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0007.jpg" alt=""></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0008.jpg" alt=""></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0009.jpg" alt=""></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0010.jpg" alt=""></div>
      <div class="vr-item"><img src="https://vogo.me/wp-content/uploads/2025/10/IMG-20251014-WA0014.jpg" alt=""></div>
    </div>
  </div>
</section>
