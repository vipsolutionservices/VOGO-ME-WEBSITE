<section style="
  background: radial-gradient(80% 120% at 50% 0%, #2436ff 0%, #1727bf 50%, #0e1a8f 100%);
  padding: 96px 24px;
  text-align: center;
  color: #ffffff;
">
  <!-- Titlu 1 -->
  <h1 style="
    margin: 0 0 12px;
    font-family: Inter, Poppins, Roboto, 'Helvetica Neue', Arial, sans-serif;
    font-weight: 400;
    font-size: clamp(40px, 7.5vw, 96px);
    line-height: 1.08;
    letter-spacing: -0.5px;
    color: #ffffff;
  ">
    The European AI Digital Commerce Ecosystem
  </h1>

  <!-- Titlu 2 -->
  <h2 style="
    margin: 0 0 32px;
    font-family: Inter, Poppins, Roboto, 'Helvetica Neue', Arial, sans-serif;
    font-weight: 400;
    font-size: clamp(18px, 2.2vw, 28px);
    line-height: 1.4;
    opacity: 0.95;
    color: #ffffff;
  ">
    Cloud &amp; On-Prem — unified commerce for modern enterprises
  </h2>

  <!-- Butoane -->
  <div style="display:inline-flex; gap:16px; flex-wrap:wrap; justify-content:center;">
    <!-- Primar -->
    <a href="#contact" role="button" style="
      display: inline-block;
      padding: 14px 24px;
      border-radius: 10px;
      background: #ffffff;
      color: #0d1b8e;
      text-decoration: none;
      font-family: Inter, Poppins, Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-weight: 600;
      font-size: 16px;
      line-height: 1;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
      transition: transform .08s ease-out;
    " onmousedown="this.style.transform='translateY(1px)';" onmouseup="this.style.transform='none';">
      Contact Sales
    </a>

    <!-- Secundar (outline) -->
    <a href="#platform" role="button" style="
      display: inline-block;
      padding: 13px 24px;
      border-radius: 10px;
      background: transparent;
      color: #ffffff;
      border: 2px solid rgba(255,255,255,0.9);
      text-decoration: none;
      font-family: Inter, Poppins, Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-weight: 600;
      font-size: 16px;
      line-height: 1;
      backdrop-filter: saturate(120%) blur(0px);
      transition: transform .08s ease-out;
    " onmousedown="this.style.transform='translateY(1px)';" onmouseup="this.style.transform='none';">
      Explore the Platform
    </a>
  </div>
</section>
