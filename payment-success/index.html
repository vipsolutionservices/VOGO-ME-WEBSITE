<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment success | VOGO</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f5f7fb; color:#0f172a; }
    main { max-width: 720px; margin: 64px auto; padding: 24px; }
    .card { background:#fff; border-radius:14px; padding:28px; box-shadow: 0 10px 30px rgba(15,23,42,.08); }
    h1 { margin-top:0; color:#0f6d47; }
    code { background:#eef2ff; padding:2px 6px; border-radius:6px; }
    .actions { margin-top:20px; display:flex; gap:12px; flex-wrap:wrap; }
    .btn { text-decoration:none; padding:10px 16px; border-radius:10px; font-weight:600; }
    .btn-primary { background:#0f6d47; color:#fff; }
    .btn-outline { border:1px solid #cbd5e1; color:#0f172a; background:#fff; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <p>✅ Stripe confirmation</p>
      <h1>Payment successful</h1>
      <p>Thank you for your order. Your Stripe Checkout session id is: <code id="session-id">not provided</code>.</p>
      <div class="actions">
        <a class="btn btn-primary" href="https://vogo.me/download-plugin/" target="_blank" rel="noopener">Download plugin</a>
        <a class="btn btn-outline" href="https://vogo.me/plugin-instructions/" target="_blank" rel="noopener">View instructions</a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      if (sessionId) {
        document.getElementById('session-id').textContent = sessionId;
      }
    })();
  </script>
</body>
</html>
