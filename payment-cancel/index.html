<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment canceled | VOGO</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f8fafc; color:#0f172a; }
    main { max-width: 720px; margin: 64px auto; padding: 24px; }
    .card { background:#fff; border-radius:14px; padding:28px; box-shadow: 0 10px 30px rgba(15,23,42,.08); }
    h1 { margin-top:0; color:#b45309; }
    .actions { margin-top:20px; display:flex; gap:12px; flex-wrap:wrap; }
    .btn { text-decoration:none; padding:10px 16px; border-radius:10px; font-weight:600; }
    .btn-primary { background:#0f6d47; color:#fff; }
    .btn-outline { border:1px solid #cbd5e1; color:#0f172a; background:#fff; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <p>ℹ️ Stripe confirmation</p>
      <h1>Payment canceled</h1>
      <p>No charge was made. You can return to checkout whenever you are ready.</p>
      <div class="actions">
        <a class="btn btn-primary" href="https://vogo.me/ro/checkout.html">Back to checkout</a>
        <a class="btn btn-outline" href="https://vogo.me/">Back to homepage</a>
      </div>
    </section>
  </main>
</body>
</html>
